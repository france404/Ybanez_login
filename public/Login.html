<body>

<div class="card card-login">
  <h3 class="text-center mb-4">JanTech Wise Login</h3>

  <form id="loginForm">
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
    </div>

    <div class="mb-3 password-wrapper">
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" required />
      <!-- Eye icon button -->
      <span id="togglePassword" class="toggle-password" title="Show/Hide Password">
        <i class="bi bi-eye"></i>
      </span>
    </div>

    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>

  <p class="mt-3 text-center">
    Don't have an account? <a href="/register">Register</a>
  </p>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const togglePassword = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("password");

  // Show/Hide password with icon toggle
  togglePassword.addEventListener("click", () => {
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      togglePassword.innerHTML = '<i class="bi bi-eye-slash"></i>';
    } else {
      passwordInput.type = "password";
      togglePassword.innerHTML = '<i class="bi bi-eye"></i>';
    }
  });

  // Login form submit
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = passwordInput.value;

    const errorDiv = document.getElementById("errorMessage");
    errorDiv.classList.add("d-none");

    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        // Redirect to dashboard
        window.location.href = "dashboard.html";
      } else {
        errorDiv.textContent = data.message || "Invalid email or password";
        errorDiv.classList.remove("d-none");
      }
    } catch (err) {
      console.error(err);
      errorDiv.textContent = "Error connecting to server";
      errorDiv.classList.remove("d-none");
    }
  });
</script>
</body>
</html>
