<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login - JanTech</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
  body {
    background-color: #082146;
  }
  .card-login {
    max-width: 400px;
    margin: 5rem auto;
    padding: 2rem;
    border-radius: 1rem;
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
    background-color: white;
  }
  .password-wrapper {
    position: relative;
  }
  .toggle-password {
    position: absolute;
    right: 10px;
    top: 38px;
    cursor: pointer;
    font-size: 18px;
    color: #0d6efd;
    user-select: none;
  }
  .captcha-wrapper {
    margin-bottom: 1rem;
  }
</style>
</head>

<body>

<div class="card card-login">
  <h3 class="text-center mb-4">JanTech Wise Login</h3>

  <form id="loginForm">
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
    </div>

    <div class="mb-3 password-wrapper">
      <label for="password" class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" required />
      <span id="togglePassword" class="toggle-password" title="Show/Hide Password"><i class="bi bi-eye"></i></span>
    </div>

    <div class="captcha-wrapper">
      <div id="captcha" class="g-recaptcha" data-sitekey="6Ley26wsAAAAANpQx0LPvUg_4okIRuCaHmSQMjHp"></div>
    </div>

    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
  <p class="mt-3 text-center">Don't have an account? <a href="/register">Register</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const togglePassword = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");
const form = document.getElementById("loginForm");
const errorDiv = document.getElementById("errorMessage");

togglePassword.addEventListener("click", () => {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    togglePassword.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    passwordInput.type = "password";
    togglePassword.innerHTML = '<i class="bi bi-eye"></i>';
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorDiv.classList.add("d-none");
  errorDiv.textContent = "";

  const email = document.getElementById("email").value.trim();
  const password = passwordInput.value;

  const captchaToken = grecaptcha.getResponse();
  console.log("Captcha token length:", captchaToken.length, "Token:", captchaToken);

  if (!captchaToken) {
    errorDiv.textContent = "Please complete the CAPTCHA first";
    errorDiv.classList.remove("d-none");
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password, "g-recaptcha-response": captchaToken })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      grecaptcha.reset();
      window.location.href = "dashboard.html";
    } else {
      errorDiv.textContent = data.message || "Invalid email or password";
      errorDiv.classList.remove("d-none");
      grecaptcha.reset();
    }
  } catch (err) {
    console.error(err);
    errorDiv.textContent = "Error connecting to server";
    errorDiv.classList.remove("d-none");
  }
});
</script>

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</body>
</html>
