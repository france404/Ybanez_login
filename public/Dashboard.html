<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - JanTech Wise</title>

<!-- Bootstrap 5 CSS CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Inline CSS for sidebar and card design -->
<style>
body {
  overflow-x: hidden;
  background-color: #f8f9fa;
}
.sidebar {
  height: 100vh;
  background-color: #343a40;
  position: fixed;
  top: 0;
  left: 0;
  width: 220px;
  padding-top: 3rem;
}
.sidebar .nav-link {
  color: #ffffff;
  font-weight: 500;
}
.sidebar .nav-link:hover {
  background-color: #495057;
}
main.content {
  margin-left: 220px;
  padding: 2rem;
}
@media (max-width: 768px) {
  .sidebar {
    position: static;
    height: auto;
    width: 100%;
    padding-top: 1rem;
  }
  main.content {
    margin-left: 0;
    padding: 1rem;
  }
}
.card-shadow {
  box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<!-- Sidebar -->
<nav class="sidebar d-flex flex-column">
  <h4 class="text-white ps-3">JanTech Wise</h4>
  <ul class="nav flex-column mt-4">
    <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="#">Rooms</a></li>
    <li class="nav-item"><a class="nav-link" href="#">Devices</a></li>
    <li class="nav-item"><a class="nav-link" href="#">Scenes</a></li>
    <li class="nav-item mt-auto ps-3 pe-3">
      <button id="logoutBtn" class="btn btn-danger w-100">Logout</button>
    </li>
  </ul>
</nav>

<!-- Main Content -->
<main class="content">
  <nav class="navbar navbar-light bg-light shadow-sm mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h4">Dashboard</span>
    </div>
  </nav>

  <h4 id="welcomeMessage"></h4>

  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card text-bg-primary mb-3 card-shadow">
        <div class="card-body">
          <h5 class="card-title">Users</h5>
          <p class="card-text">120</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-success mb-3 card-shadow">
        <div class="card-body">
          <h5 class="card-title">Devices</h5>
          <p class="card-text">45</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-bg-warning mb-3 card-shadow">
        <div class="card-body">
          <h5 class="card-title">Alerts</h5>
          <p class="card-text">3</p>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- JWT login logic -->
<script>
function parseJwt(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join('')
    );
    return JSON.parse(jsonPayload);
  } catch(e) { return null; }
}

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login";
} else {
  const user = parseJwt(token);
  if(user && user.id){
    document.getElementById("welcomeMessage").innerText = "Welcome User ID: " + user.id;
  } else {
    localStorage.removeItem("token");
    window.location.href = "/login";
  }
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("token");
  window.location.href = "/login";
});
</script>

</body>
</html>
