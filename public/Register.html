<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Register - JanTech</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

<style>
  body {
    background-color: #082146;
  }

  .card-register {
    max-width: 450px;
    margin: 4rem auto;
    padding: 2rem;
    border-radius: 1rem;
    box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
    background-color: white;
  }

  .password-wrapper {
    position: relative;
  }

  .password-wrapper input {
    padding-right: 45px;
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #0d6efd;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
</style>
</head>
<body>

<div class="card card-register">
  <h3 class="text-center mb-4">Create Account</h3>
  
  <form id="registerForm" novalidate>
    <div class="mb-3">
      <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name" required />
    </div>
    <div class="mb-3">
      <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required />
    </div>
    <div class="mb-3 password-wrapper">
      <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required />
      <span class="toggle-password" id="togglePassword1" title="Show/Hide Password">
        <i class="bi bi-eye"></i>
      </span>
    </div>
    <div class="mb-3 password-wrapper">
      <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Confirm password" required />
      <span class="toggle-password" id="togglePassword2" title="Show/Hide Password">
        <i class="bi bi-eye"></i>
      </span>
    </div>

    <!-- Google reCAPTCHA -->
    <div class="mb-3">
      <div class="g-recaptcha" data-sitekey="6Ley26wsAAAAANpQx0LPvUg_4okIRuCaHmSQMjHp"></div>
    </div>

    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>

  <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>

  <p class="mt-3 text-center">
    Already have an account? <a href="/login">Login</a>
  </p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const togglePassword1 = document.getElementById("togglePassword1");
const togglePassword2 = document.getElementById("togglePassword2");
const passwordInput = document.getElementById("password");
const confirmInput = document.getElementById("confirmPassword");
const form = document.getElementById("registerForm");
const errorDiv = document.getElementById("errorMessage");

// Toggle password visibility
togglePassword1.addEventListener("click", () => {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    togglePassword1.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    passwordInput.type = "password";
    togglePassword1.innerHTML = '<i class="bi bi-eye"></i>';
  }
});

togglePassword2.addEventListener("click", () => {
  if (confirmInput.type === "password") {
    confirmInput.type = "text";
    togglePassword2.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    confirmInput.type = "password";
    togglePassword2.innerHTML = '<i class="bi bi-eye"></i>';
  }
});

// Handle registration
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  errorDiv.classList.add("d-none");
  errorDiv.textContent = "";

  const name = form.name.value.trim();
  const email = form.email.value.trim();
  const password = passwordInput.value;
  const confirmPassword = confirmInput.value;

  if (password !== confirmPassword) {
    errorDiv.textContent = "Passwords do not match";
    errorDiv.classList.remove("d-none");
    return;
  }

  const captchaToken = grecaptcha.getResponse();
  if (!captchaToken) {
    alert("Please complete CAPTCHA");
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password, confirmPassword, captcha: captchaToken })
    });

    const data = await res.json();

    if (res.ok) {
      alert("Registration successful! Please login.");
      window.location.href = "/login";
    } else {
      errorDiv.textContent = data.message || "Registration failed";
      errorDiv.classList.remove("d-none");
    }
  } catch (err) {
    console.error(err);
    errorDiv.textContent = "Error connecting to server";
    errorDiv.classList.remove("d-none");
  }
});
</script>

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</body>
</html>
