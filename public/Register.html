<body>

<div class="card card-register">
  <h3 class="text-center mb-4">Create Account</h3>
  
  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Enter your full name" required />
    </div>
    
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="Enter your email" required />
    </div>
    
    <div class="mb-3 password-wrapper">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter password" required />
      <span class="toggle-password" id="togglePassword1" title="Show/Hide Password">
        <i class="bi bi-eye"></i>
      </span>
    </div>
    
    <div class="mb-3 password-wrapper">
      <label class="form-label">Confirm Password</label>
      <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required />
      <span class="toggle-password" id="togglePassword2" title="Show/Hide Password">
        <i class="bi bi-eye"></i>
      </span>
    </div>
    
    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>

  <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>

  <p class="mt-3 text-center">
    Already have an account? <a href="/login">Login</a>
  </p>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const togglePassword1 = document.getElementById("togglePassword1");
const togglePassword2 = document.getElementById("togglePassword2");
const passwordInput = document.getElementById("password");
const confirmInput = document.getElementById("confirmPassword");

// Toggle password visibility
togglePassword1.addEventListener("click", () => {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    togglePassword1.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    passwordInput.type = "password";
    togglePassword1.innerHTML = '<i class="bi bi-eye"></i>';
  }
});

togglePassword2.addEventListener("click", () => {
  if (confirmInput.type === "password") {
    confirmInput.type = "text";
    togglePassword2.innerHTML = '<i class="bi bi-eye-slash"></i>';
  } else {
    confirmInput.type = "password";
    togglePassword2.innerHTML = '<i class="bi bi-eye"></i>';
  }
});

// Handle registration
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = passwordInput.value;
  const confirmPassword = confirmInput.value;

  const errorDiv = document.getElementById("errorMessage");
  errorDiv.classList.add("d-none");

  if(password !== confirmPassword) {
    errorDiv.textContent = "Passwords do not match";
    errorDiv.classList.remove("d-none");
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if(res.ok) {
      alert("Registration successful! Please login.");
      window.location.href = "/login";
    } else {
      errorDiv.textContent = data.message || "Email already exists!";
      errorDiv.classList.remove("d-none");
    }

  } catch(err) {
    console.error(err);
    errorDiv.textContent = "Error connecting to server";
    errorDiv.classList.remove("d-none");
  }
});
</script>

</body>
</html>
